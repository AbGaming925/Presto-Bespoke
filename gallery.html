<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | PRESTO Office Automations</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>

<video class="site-bg-video" autoplay muted loop playsinline>
<source src="assets/videos/presto-hero.mp4" type="video/mp4">
</video>

<header class="navbar">
<div class="logo"><img src="assets/images/presto-logo.png" alt="PRESTO"></div>
<nav class="nav-links">
<a href="index.html">Home</a>
<a href="offers.html">Exclusive Offers</a>
<a href="category.html">Category</a>
<a href="contact.html">Contact</a>
<a
    href="https://eleganzastamps.com/"
    target="_blank"
    title="Buy Online">

    <i class="fas fa-cart-shopping"></i>

</a>
</nav>
<button class="menu-btn"><i class="fa-solid fa-bars"></i></button>
</header>

<section class="category-hero">
<div class="hero-content">
<span class="badge">PRODUCT GALLERY</span>
<h1>PRESTO Collection</h1>
<p>Browse premium products from the PRESTO catalogue.</p>
</div>
</section>

<section style="width:min(1400px,95%);margin:auto;padding-top:20px;">

<div style="max-width:700px;margin:0 auto 40px;position:relative;">
<input id="searchInput" type="text" placeholder="Search products..." style="width:100%;padding:18px 60px 18px 20px;border:none;border-radius:18px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);color:white;">
<i class="fas fa-search" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);color:white;"></i>
</div>

<h2
id="galleryTitle"
style="
text-align:center;
margin-bottom:30px;
font-size:2.4rem;">
Loading...
</h2>

<div
class="category-grid"
id="productsContainer">

</div>
</section>

<footer class="footer">
<div class="footer-content">Bespoke Innovations Pvt. Ltd. | Ganganagar | Doltala More | Kolkata | +91 9007571931</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="products.js"></script>
<script src="script.js"></script>
<script>
/* ======================================
   PRODUCT GALLERY
====================================== */

const params =
new URLSearchParams(window.location.search);

const currentCategory =
params.get("cat");

const container =
document.getElementById("productsContainer");

const title =
document.getElementById("galleryTitle");

const names={

presto:"PRESTO Self Inking",

shiny:"Shiny Stamps",

flash_i:"Flash Stamps • I-Series",

flash_e:"Flash Stamps • E-Series",

flash_nsp:"Flash Stamps • NSP Series",

flash_machine:"Flash Machines",

polymer_machine:"Polymer Machines",

shiny_ink:"Shiny Inks",

noris_ink:"Noris Inks",

flash_ink:"Flash Inks",

gel_stamp:"Gel Stamps",

foams:"Foams",

liquid_polymer:"Liquid Polymers",

sachets:"Sachets",

backup_sheet:"Backup Sheets",

stamp_pad:"Stamp Pads",

others:"Accessories"

};

title.innerHTML=
names[currentCategory] || "Products";

const filteredProducts=
products.filter(product=>
product.category===currentCategory
);

container.innerHTML="";

filteredProducts.forEach(product=>{

container.innerHTML+=`

<div class="category-card product-card">

<img
src="${product.image}"
alt="${product.name}">

<h3>${product.name}</h3>

<img
src="${product.barcode}"
class="barcode-img"
alt="Barcode">

<p>

${product.description}

</p>

<div
style="display:flex;gap:10px;width:100%;">

<a
class="btn primary"
href="https://wa.me/919007571931?text=Hello, I'm interested in ${encodeURIComponent(product.name)}">

WhatsApp

</a>

<a
class="btn secondary"
href="contact.html?product=${encodeURIComponent(product.name)}">

Enquiry

</a>

</div>

</div>

`;

});

const search=document.getElementById("searchInput");

search.addEventListener("keyup",function(){

const value=
this.value.toLowerCase();

document
.querySelectorAll(".product-card")
.forEach(card=>{

const text=
card.innerText.toLowerCase();

card.style.display=

text.includes(value)

?

"flex"

:

"none";

});

});

</script>

</body>
</html>
